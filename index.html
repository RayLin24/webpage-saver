<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPage Saver - 网页保存工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .app {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 25px;
        }
        
        .card-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="url"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .options {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .option-item {
            display: flex;
            align-items: center;
        }
        
        .option-item input[type="checkbox"] {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .option-item label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: normal;
            font-size: 13px;
        }
        
        .btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
        }
        
        .btn-small {
            padding: 8px 12px;
            font-size: 13px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .progress {
            margin-top: 15px;
            display: none;
        }
        
        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        
        .progress-text {
            margin-top: 8px;
            font-size: 13px;
            color: #666;
        }
        
        .status {
            margin-top: 15px;
            padding: 12px 15px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }
        
        .status.info {
            background: #e3f2fd;
            color: #1976d2;
            display: block;
        }
        
        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            display: block;
        }
        
        .status.error {
            background: #ffebee;
            color: #d32f2f;
            display: block;
        }
        
        /* 历史记录样式 */
        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        
        .history-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }
        
        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .history-item-title {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            word-break: break-all;
            flex: 1;
            margin-right: 10px;
        }
        
        .history-item-time {
            font-size: 12px;
            color: #999;
            white-space: nowrap;
        }
        
        .history-item-url {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .history-item-meta {
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
        }
        
        .history-item-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .history-empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .history-empty-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .history-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }
        
        .clear-all-btn {
            color: #dc3545;
            cursor: pointer;
            font-size: 13px;
        }
        
        .clear-all-btn:hover {
            text-decoration: underline;
        }
        
        /* 预览模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            padding: 5px;
            line-height: 1;
        }
        
        .modal-close:hover {
            color: #333;
        }
        
        .modal-body {
            flex: 1;
            overflow: hidden;
        }
        
        .modal-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        /* 存储大小指示器 */
        .storage-info {
            margin-top: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .storage-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            width: 150px;
        }
        
        .storage-bar-fill {
            height: 100%;
            background: #28a745;
            border-radius: 3px;
            transition: width 0.3s, background 0.3s;
        }
        
        /* 搜索框 */
        .search-box {
            margin-bottom: 15px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: #333;
            color: white;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .toast.success {
            background: #28a745;
        }
        
        .toast.error {
            background: #dc3545;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
        
        .footer a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🌐 WebPage Saver</h1>
            <p>将任意网页保存为单个HTML文件，支持历史记录、预览和下载</p>
        </div>
        
        <div class="main-content">
            <!-- 左侧：保存区域 -->
            <div class="card">
                <div class="card-title">
                    <span>💾</span> 保存网页
                </div>
                
                <div class="input-group">
                    <label for="url">网页URL</label>
                    <input type="url" id="url" placeholder="https://example.com" required>
                </div>
                
                <div class="options">
                    <label style="margin-bottom: 10px;">保存选项</label>
                    <div class="options-grid">
                        <div class="option-item">
                            <input type="checkbox" id="inlineImages" checked>
                            <label for="inlineImages">内联图片</label>
                        </div>
                        <div class="option-item">
                            <input type="checkbox" id="inlineCSS" checked>
                            <label for="inlineCSS">内联CSS</label>
                        </div>
                        <div class="option-item">
                            <input type="checkbox" id="inlineFonts" checked>
                            <label for="inlineFonts">内联字体</label>
                        </div>
                        <div class="option-item">
                            <input type="checkbox" id="removeScripts">
                            <label for="removeScripts">移除JS</label>
                        </div>
                    </div>
                </div>
                
                <button class="btn" id="saveBtn" style="width: 100%;">🚀 开始保存</button>
                
                <div class="progress" id="progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">准备中...</div>
                </div>
                
                <div class="status" id="status"></div>
                
                <div class="storage-info" id="storageInfo">
                    <div>
                        <span>📦 已使用存储空间</span>
                        <div class="storage-bar" style="margin-top: 5px;">
                            <div class="storage-bar-fill" style="width: 0%;"></div>
                        </div>
                    </div>
                    <span id="storageSize">计算中...</span>
                </div>
            </div>
            
            <!-- 右侧：历史记录 -->
            <div class="card">
                <div class="card-title">
                    <span>📚</span> 历史记录
                </div>
                
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 搜索历史记录...">
                </div>
                
                <div class="history-stats">
                    <span>共 <strong id="historyCount">0</strong> 条记录</span>
                    <span class="clear-all-btn" id="clearAllBtn">清空全部</span>
                </div>
                
                <div class="history-list" id="historyList">
                    <div class="history-empty">
                        <div class="history-empty-icon">📭</div>
                        <p>暂无历史记录</p>
                        <p style="font-size: 12px; margin-top: 5px;">保存的网页将显示在这里</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>使用 <a href="https://github.com/RayLin24/webpage-saver" target="_blank">GitHub</a> 托管 | 
               灵感来源于 <a href="https://github.com/gildas-lormeau/SingleFile" target="_blank">SingleFile</a></p>
        </div>
    </div>
    
    <!-- 预览模态框 -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="previewTitle">预览</div>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <iframe id="previewFrame"></iframe>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary btn-small" id="downloadFromPreview">📥 下载</button>
                <button class="btn btn-small" id="closePreviewBtn">关闭</button>
            </div>
        </div>
    </div>
    
    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>
    
    <script src="main.js"></script>
</body>
</html>
