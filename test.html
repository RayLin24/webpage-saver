<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>功能测试</title>
</head>
<body>
    <h1>WebPage Saver 功能测试</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.style.padding = '10px';
            div.style.margin = '5px';
            div.style.borderRadius = '5px';
            div.style.background = type === 'pass' ? '#d4edda' : type === 'fail' ? '#f8d7da' : '#e2e3e5';
            div.innerHTML = msg;
            results.appendChild(div);
        }
        
        async function runTests() {
            log('开始测试...');
            
            // 测试1: 检查全局变量
            try {
                if (typeof StorageManager !== 'undefined') {
                    log('✅ StorageManager 类已定义', 'pass');
                } else {
                    log('❌ StorageManager 类未定义', 'fail');
                }
            } catch (e) {
                log('❌ StorageManager 检查失败: ' + e.message, 'fail');
            }
            
            // 测试2: 检查 IndexedDB 支持
            try {
                if (window.indexedDB) {
                    log('✅ IndexedDB 支持', 'pass');
                } else {
                    log('❌ IndexedDB 不支持', 'fail');
                }
            } catch (e) {
                log('❌ IndexedDB 检查失败: ' + e.message, 'fail');
            }
            
            // 测试3: 初始化 StorageManager
            try {
                const storage = new StorageManager();
                await storage.init();
                log('✅ StorageManager 初始化成功', 'pass');
                
                // 测试4: 添加数据
                const testItem = {
                    id: 'test_' + Date.now(),
                    url: 'https://test.com',
                    title: '测试页面',
                    content: '<html><body>测试</body></html>',
                    savedAt: new Date().toISOString(),
                    size: 100
                };
                
                await storage.add(testItem);
                log('✅ 添加数据成功', 'pass');
                
                // 测试5: 读取数据
                const all = await storage.getAll();
                if (all.length > 0) {
                    log('✅ 读取数据成功，共 ' + all.length + ' 条', 'pass');
                } else {
                    log('❌ 读取数据为空', 'fail');
                }
                
                // 测试6: 删除测试数据
                await storage.delete(testItem.id);
                log('✅ 删除数据成功', 'pass');
                
            } catch (e) {
                log('❌ StorageManager 测试失败: ' + e.message, 'fail');
            }
            
            // 测试7: 检查下载函数
            try {
                if (typeof WebPageSaver !== 'undefined') {
                    const app = new WebPageSaver();
                    if (typeof app.downloadHTML === 'function') {
                        log('✅ downloadHTML 函数存在', 'pass');
                    } else {
                        log('❌ downloadHTML 函数不存在', 'fail');
                    }
                } else {
                    log('⚠️ WebPageSaver 类未定义（需要 main.js）', 'info');
                }
            } catch (e) {
                log('❌ 下载函数检查失败: ' + e.message, 'fail');
            }
            
            log('测试完成！');
        }
        
        // 加载 main.js 后运行测试
        const script = document.createElement('script');
        script.src = 'main.js';
        script.onload = runTests;
        script.onerror = () => log('❌ 无法加载 main.js', 'fail');
        document.body.appendChild(script);
    </script>
</body>
</html>
